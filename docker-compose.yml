version: "3.9"

services:
  overleaf:
    image: sharelatex/sharelatex:latest
    container_name: overleaf
    restart: unless-stopped

    depends_on:
      - mongo
      - redis

    ports:
      - "80:80"

    environment:
      OVERLEAF_APP_NAME: "Private Overleaf"

      OVERLEAF_MONGO_URL: mongodb://mongo/sharelatex

      OVERLEAF_REDIS_HOST: redis
      REDIS_HOST: redis

      # IMPORTANT: Required for invite token generation
      # OVERLEAF_INVITE_TOKEN_SECRET: generate with `openssl rand -base64 32`

      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"

      ENABLE_CONVERSIONS: "true"

      EMAIL_CONFIRMATION_DISABLED: "true"

      OVERLEAF_SITE_URL: "http://YOUR_IP"

      # BIG compile timeout
      COMPILE_TIMEOUT: 1800

      # Large uploads
      MAX_HTTP_HEADER_SIZE: 32768

      # Optional
      OVERLEAF_SECURE_COOKIE: "false"

    volumes:
      - ./overleaf_data:/var/lib/overleaf

    shm_size: "4gb"

  mongo:
    image: mongo:8
    container_name: mongo
    restart: unless-stopped

    command: --replSet overleaf

    volumes:
      - ./mongo_data:/data/db

    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  mongo-init-replica:
    image: mongo:8
    depends_on:
      mongo:
        condition: service_healthy

    command: >
      mongosh --host mongo:27017 --eval '
      rs.initiate({
        _id: "overleaf",
        members: [{ _id: 0, host: "mongo:27017" }]
      })'

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - ./redis_data:/data
